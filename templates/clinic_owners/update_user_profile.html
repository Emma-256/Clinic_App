{% extends "medi_clinics/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container-fluid py-5 px-0">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 px-0 py-5">
            <div class="card mb-3">
                <div class="card-header bg-primary text-white py-2">
                    <h4 class="text-center mb-0">
                        <i class="bi bi-key me-2"></i>Update Login Credentials
                    </h4>
                </div>
                <div class="card-body p-3">
                    <form method="post">
                        {% csrf_token %}

                        <div class="row">
                            <!-- User fields in two columns -->
                            {% for field in user_form %}
                                <div class="col-12 col-md-6 mb-0 py-0 m-0">
                                    {{ field|as_crispy_field }}
                                </div>
                            {% endfor %}

                            <!-- Password fields in two columns -->
                            {% for field in password_form %}
                                <div class="col-12 col-md-6 mb-0 py-0 m-0">
                                    {{ field|as_crispy_field }}
                                </div>
                            {% endfor %}
                        </div>

                        <div class="row g-4 mt-2">
                            <div class="col-6">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-save me-2"></i>Save Changes
                                </button>
                            </div>
                            <div class="col-6">
                                <a href="{% url 'clinic_owners:profile' %}" class="btn btn-secondary w-100">
                                    <i class="bi bi-x-circle me-2"></i>Cancel
                                </a>
                            </div>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
