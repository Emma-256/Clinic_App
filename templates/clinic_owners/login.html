{% extends 'medi_clinics/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center ">
    <div class="col-md-6 pt-5 mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">   <!-- centered header -->
                <h4 class="mb-0">Login</h4>
            </div>
            <div class="card-body text-center">   <!-- center form content -->
                <form method="post" class="d-inline-block text-start" style="max-width: 350px; width: 100%;"> 
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="mt-3 mb-0">
                    Don't have an account? <a href="{% url 'clinic_owners:register' %}">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
